<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Register</title>

    <link rel="stylesheet"
    href="auth.css">

</head>

<body>

<div class="container">

    <div class="login-box">

        <h1>Notes Keeper</h1>

        <h2>Create Account</h2>

        <input
        type="text"
        id="registerName"
        placeholder="Enter Name">

        <input
        type="email"
        id="registerEmail"
        placeholder="Enter Email">

        <input
        type="password"
        id="registerPassword"
        placeholder="Enter Password">

        <button onclick="register()">

            Register

        </button>

        <p>

            Already have account?

            <a href="login.html">

                Login

            </a>

        </p>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
