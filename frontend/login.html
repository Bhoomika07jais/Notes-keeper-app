<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <link rel="stylesheet"
        href="auth.css">

</head>

<body>

<div class="container">

    <div class="login-box">

        <h1>Notes Keeper</h1>

        <h2>Login</h2>

        <input
        type="email"
        id="loginEmail"
        placeholder="Enter Email">

        <input
        type="password"
        id="loginPassword"
        placeholder="Enter Password">

        <button onclick="login()">

            Login

        </button>

        <p>

            Don't have account?

            <a href="register.html">

                Register

            </a>

        </p>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
